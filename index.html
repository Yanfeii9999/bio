    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
        }
        body {
            background-color: #0b0b0e; color: #ffffff; min-height: 100vh;
            display: flex; justify-content: center; align-items: center; overflow-x: hidden; position: relative;
        }
        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -2; filter: brightness(0.3) blur(10px); transform: scale(1.05); pointer-events: none;
        }
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: -1; pointer-events: none;
        }
        .container { width: 100%; max-width: 400px; padding: 20px; z-index: 1; }
        .discord-profile-card {
            background: #18191c; border-radius: 16px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7); border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .discord-banner { width: 100%; height: 120px; object-fit: cover; background: #2b2d31; pointer-events: none; }
        .discord-body { padding: 0 16px 16px 16px; position: relative; }
        .discord-avatar-container { position: relative; width: 80px; height: 80px; margin-top: -45px; margin-bottom: 10px; }
        .discord-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 6px solid #18191c; pointer-events: none; }
        .discord-online-badge {
            position: absolute; bottom: 4px; right: 4px; width: 16px; height: 16px;
            background-color: #23a55a; border: 3px solid #18191c; border-radius: 50%;
        }
        .discord-username-area { margin-bottom: 12px; }
        .discord-display-name { font-size: 1.25rem; font-weight: 700; color: #f2f3f5; display: flex; align-items: center; gap: 6px; }
        .discord-username { font-size: 0.85rem; color: #949ba4; }
        .discord-badges-icons { color: #5865F2; font-size: 1rem; }
        .discord-bio {
            font-size: 0.85rem; color: #dbdee1; line-height: 1.5; background: #111214;
            padding: 10px; border-radius: 8px; margin-bottom: 12px; word-break: break-word;
        }
        .discord-bio a { color: #00a8fc; text-decoration: none; }
        .discord-bio a:hover { text-decoration: underline; }
        .bio-title-text { color: #949ba4; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.5px; }
        .discord-roles-container { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
        .role-pill {
            display: inline-flex; align-items: center; gap: 5px; background: #2b2d31;
            padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; color: #dbdee1; border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .role-dot { width: 8px; height: 8px; border-radius: 50%; }
        .discord-edit-btn {
            display: block; width: 100%; background-color: #5865F2; color: white; text-align: center;
            padding: 10px; border-radius: 8px; font-weight: 600; font-size: 0.9rem; text-decoration: none; transition: background-color 0.2s;
        }
        .discord-edit-btn:hover { background-color: #4752c4; }
        .social-icons { display: flex; justify-content: center; gap: 12px; margin-top: 15px; }
        .social-btn {
            width: 40px; height: 40px; background: #18191c; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; color: #dbdee1; font-size: 1.1rem; text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.2s;
        }
        .social-btn:hover { background: #2b2d31; color: white; }
        .views-counter {
            position: fixed; bottom: 20px; left: 20px; display: inline-flex; align-items: center; gap: 6px;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); padding: 6px 12px; border-radius: 20px;
            font-size: 0.8rem; color: #d4d4d8; border: 1px solid rgba(255, 255, 255, 0.05); z-index: 1000;
        }
        .music-control-btn {
            position: fixed; bottom: 20px; right: 20px; background: rgba(24, 25, 28, 0.85); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); color: #ffffff; padding: 10px 14px; border-radius: 20px;
            font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 8px; z-index: 1000; transition: all 0.3s;

        .music-control-btn:hover { background: rgba(88, 101, 242, 0.9); }
